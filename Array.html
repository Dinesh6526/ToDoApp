<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="addData()">Add user</button>
    <h1 id="content"></h1> 
    <script>
        let userdata = [];
        let index = 0;
        function addData() {
            let value = document.getElementById("username").value;
            userdata.push(value);
            document.getElementById("content").innerText = userdata[index];

        }
    </script>   
</body>
</html>
