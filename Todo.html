<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        body {
            background-color: rgb(112, 130, 174);
            margin: 0;
        }

        .Main {
            width: 50vw;
            height: 80vh;
            background-color: rgb(62, 183, 179);
            position: relative;
            top: 10vh;
            left: 25vw;
            font-size: medium;
            color: rgb(250, 250, 250);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid white;
            border-radius: 50px;

        }

        input {
            width: 300px;
            height: 40px;
            border-radius: 10px;
        }

        button {
            width: 200px;
            height: 40px;
            border-radius: 10px;
            background-color: rgb(206, 179, 45);
            color: azure;
            font-size: x-large;
        }

        ::placeholder {
            color: rgb(9, 9, 9);
            font-size: larger;
            padding-left: 30px;
            font-family: Arial, Helvetica, sans-serif;

        }

        .removebutton {
            background-color: rgb(199, 58, 30);
            height: 5vh;
            color: white;
            width: 100px;
            position: absolute;
            right: 1vw;
            border-radius: 10px;
            font-size: medium;
        }

        .Sub {
            position: relative;
            width: 20vw;
            height: 7vh;
            background-color: #f7ecf5;
            color: rgb(3, 2, 2);
            border-radius: 10px;
            border: 2px solid rgb(221, 151, 0);
            display: flex;
            justify-content:space-evenly;
            align-items: center;
            margin-top: 20px;
        }

        .Sub span {
            position: absolute;
            left: 2vw;
            text-align: left;


        }

        #todolist {
            overflow-y: scroll;
        }
        
    </style>
</head>

<body>
    <div class="Main">
        <h1>To-Do List</h1>
        <input type="text" id="todoinput" placeholder="Enter task">
        <br>
        <button onclick="addToDo()">Enter</button>
        <div id="todolist">

        </div>

    </div>
    <script>
        function addToDo() {
            let taskvalue = document.getElementById('todoinput').value;
            if (taskvalue == "") {
                return;
            }
            let taskstore = document.createElement("div");
            taskstore.className = "Sub";

            let tasktext = document.createElement("span");
            tasktext.innerText = taskvalue;

            let removebutton = document.createElement("button");
            removebutton.innerText = "Remove";
            removebutton.className = "removebutton";
            removebutton.onclick = function () {
                taskstore.remove();
            }

            taskstore.appendChild(tasktext);
            taskstore.appendChild(removebutton);

            document.getElementById('todolist').appendChild(taskstore);
            document.getElementById('todoinput').value = "";
        }
    </script>
</body>

</html>
